<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#081223 0%,#0d1b35 100%);
      color:#eef4ff;
    }
    .card{
      max-width:620px;
      background:linear-gradient(180deg, rgba(17,35,71,.98), rgba(12,26,52,.98));
      border:1px solid #223a6b;
      border-radius:22px;
      padding:30px;
      text-align:center;
      box-shadow:0 18px 40px rgba(0,0,0,.24);
    }
    img{
      height:52px;
      width:auto;
      background:white;
      padding:4px;
      border-radius:6px;
      margin-bottom:18px;
    }
    h1{margin:0 0 10px;font-size:2rem}
    p{margin:0;color:#a9b8d8;line-height:1.6}
    a{
      display:inline-block;
      margin-top:20px;
      padding:12px 16px;
      border-radius:12px;
      text-decoration:none;
      color:white;
      background:linear-gradient(180deg,#1177dd,#0a59b8);
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="KEO.png" alt="KEO logo" />
    <h1>Thank you</h1>
    <p>Your observation has been submitted to the KEO team.</p>
    <a href="observation.html">Submit another observation</a>
  </div>
</body>
</html>
