<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three Things We Must Get Right This Week</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="pageShell">
    <section class="heroCard">
      <header class="topBar">
        <img src="assets/keo-logo.svg" alt="KEO logo" class="logo" />
        <div class="project">SAADIYAT LAGOONS PROJECT</div>
      </header>

      <section class="heroLayout">
        <div class="titleBlock">
          <div class="line"></div>
          <h1>THREE THINGS WE MUST GET RIGHT THIS WEEK</h1>
        </div>

        <div class="videoCard">
          <div class="tabs" role="tablist" aria-label="Video language selector">
            <button class="tab active" data-video="assets/english.mp4" data-lang="English">English</button>
            <button class="tab" data-video="assets/arabic.mp4" data-lang="Arabic">العربية</button>
            <button class="tab" data-video="assets/hindi.mp4" data-lang="Hindi">हिन्दी</button>
          </div>

          <div class="videoFrame">
            <video id="mainVideo" controls playsinline preload="metadata" poster="assets/poster.jpg">
              <source src="assets/english.mp4" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
